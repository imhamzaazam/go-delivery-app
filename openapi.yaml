components:
    schemas:
        CreateUserRequest:
            type: object
            required:
                - full_name
                - email
                - password
            properties:
                full_name:
                    type: string
                email:
                    type: string
                    format: email
                password:
                    type: string
        CreateUserResponse:
            type: object
            properties:
                uid:
                    type: string
                    format: uuid
                full_name:
                    type: string
                email:
                    type: string
                    format: email
        LoginUserRequest:
            type: object
            required:
                - email
                - password
            properties:
                email:
                    type: string
                    format: email
                password:
                    type: string
        LoginUserResponse:
            type: object
            properties:
                email:
                    type: string
                    format: email
                access_token:
                    type: string
                refresh_token:
                    type: string
                access_token_expires_at:
                    type: string
                    format: date-time
                refresh_token_expires_at:
                    type: string
                    format: date-time
        RenewAccessTokenRequest:
            type: object
            required:
                - refresh_token
            properties:
                refresh_token:
                    type: string
        RenewAccessTokenResponse:
            type: object
            properties:
                access_token:
                    type: string
                access_token_expires_at:
                    type: string
                    format: date-time
        ErrorResponse:
            type: object
            properties:
                code:
                    type: string
                errors:
                    type: string
    securitySchemes:
        BearerAuth:
            bearerFormat: JWT
            scheme: bearer
            type: http
info:
    description: Auto-generated from registered chi routes
    title: Go Web API Boilerplate
    version: 1.0.0
openapi: 3.0.3
